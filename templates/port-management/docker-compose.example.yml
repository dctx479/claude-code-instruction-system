# Docker Compose 示例 - 带端口管理元数据
# 使用: docker-compose-sync.py sync ./docker-compose.yml

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: myproject-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mydb}
    volumes:
      - mysql_data:/var/lib/mysql
    # 端口管理元数据
    x-port-manager:
      service: mysql
      description: 主数据库
      auto-assign: true

  redis:
    image: redis:7
    container_name: myproject-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    x-port-manager:
      service: redis
      description: 缓存服务

  api:
    build: .
    container_name: myproject-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-mydb}
      REDIS_URL: redis://redis:6379
    depends_on:
      - mysql
      - redis
    x-port-manager:
      service: api
      description: 后端 API

  web:
    image: nginx:alpine
    container_name: myproject-web
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    x-port-manager:
      service: web
      description: 前端服务

volumes:
  mysql_data:
  redis_data:
